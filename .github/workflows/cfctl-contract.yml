name: cfctl contract

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  static-contract:
    name: static contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static contract
        run: ./scripts/verify_static_contract.sh

      - name: Verify credentialless bootstrap output
        run: python3 scripts/verify_permission_catalog.py --cfctl ./cfctl

  live-contract:
    name: live Cloudflare contract
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    env:
      CF_DEV_TOKEN: ${{ secrets.CF_DEV_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CFCTL_PUBLIC_CONTRACT_ZONE: ${{ vars.CFCTL_PUBLIC_CONTRACT_ZONE }}
      CFCTL_PUBLIC_CONTRACT_ZONE_SECRET: ${{ secrets.CFCTL_PUBLIC_CONTRACT_ZONE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require live credentials
        run: |
          set -euo pipefail
          shared_env_file="${RUNNER_TEMP}/cfctl-empty.env"
          repo_env_file="${RUNNER_TEMP}/cfctl-missing.env"
          : > "${shared_env_file}"
          {
            echo "CF_SHARED_ENV_FILE=${shared_env_file}"
            echo "CF_REPO_ENV_FILE=${repo_env_file}"
          } >> "${GITHUB_ENV}"
          if [[ -z "${CFCTL_PUBLIC_CONTRACT_ZONE:-}" && -n "${CFCTL_PUBLIC_CONTRACT_ZONE_SECRET:-}" ]]; then
            CFCTL_PUBLIC_CONTRACT_ZONE="${CFCTL_PUBLIC_CONTRACT_ZONE_SECRET}"
            export CFCTL_PUBLIC_CONTRACT_ZONE
            echo "CFCTL_PUBLIC_CONTRACT_ZONE=${CFCTL_PUBLIC_CONTRACT_ZONE}" >> "${GITHUB_ENV}"
          fi
          if [[ -z "${CF_DEV_TOKEN:-}" ]]; then
            echo "::error::CF_DEV_TOKEN secret is required for the live Cloudflare contract job."
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required for the live Cloudflare contract job."
            exit 1
          fi
          if [[ -z "${CFCTL_PUBLIC_CONTRACT_ZONE:-}" ]]; then
            echo "::error::CFCTL_PUBLIC_CONTRACT_ZONE variable or secret is required for live DNS/token smoke tests."
            exit 1
          fi

      - name: Verify permission catalog against live groups
        run: |
          set -euo pipefail
          ./cfctl token permission-groups > "${RUNNER_TEMP}/permission-groups.json"
          python3 scripts/verify_permission_catalog.py --permission-groups "${RUNNER_TEMP}/permission-groups.json"

      - name: Verify public contract
        run: ./scripts/verify_public_contract.sh
